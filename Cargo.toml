[workspace]
members = [
    "crates/slicer-host",
    "crates/slicer-core",
    "crates/slicer-ir",
    "crates/slicer-macros",
    "crates/slicer-sdk",
    "crates/slicer-test",
    "cli/slicer-cli",
    "crates/slicer-helpers",
    "modules/core-modules/layer-planner-default",
    "modules/core-modules/classic-perimeters",
    "modules/core-modules/rectilinear-infill",
    "modules/core-modules/traditional-support",
    "modules/core-modules/arachne-perimeters",
    "modules/core-modules/gyroid-infill",
    "modules/core-modules/lightning-infill",
    "modules/core-modules/seam-placer",
    "modules/core-modules/tree-support",
    "modules/core-modules/support-surface-ironing",
    "modules/core-modules/mesh-segmentation",
    "modules/core-modules/paint-segmentation",
]

[workspace.package]
edition = "2021"
rust-version = "1.78"
authors = ["ModularSlicer Team"]
version = "0.1.0"

[workspace.dependencies]
# Core dependencies
wasmtime = "20.0"
wit-bindgen = "0.24"
rayon = "1.10"
geo = "0.28"
nalgebra = "0.32"
clipper2-rust = "1.0.1"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
meshopt = "0.6"
truck-stepio = "0.3"
truck-meshalgo = "0.4"
truck-modeling = "0.6"

# CLI dependencies
clap = "4"

# Python bridge
pyo3 = { version = "0.20", features = ["extension-module"] }
wasmtime-py = "20.0"

[workspace.lints.rust]
unused_imports = "warn"
unused_must_use = "warn"

[profile.release]
opt-level = 3
lto = "thin"
strip = true

[workspace]
members = [
    "crates/slicer-ir",
    "crates/slicer-macros",
]

[workspace.package]
edition = "2021"
rust-version = "1.78"
authors = ["ModularSlicer Team"]
version = "0.1.0"

[workspace.dependencies]
# Core dependencies
wasmtime = "20.0"
wit-bindgen = "0.24"
rayon = "1.10"
geo = "0.28"
nalgebra = "0.32"
clipper2-rust = "1.3"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# CLI dependencies
clap = "4"

# Python bridge
pyo3 = { version = "0.20", features = ["extension-module"] }
wasmtime-py = "20.0"

[workspace.lints.rust]
unused_imports = "warn"
unused_must_use = "warn"

[profile.release]
opt-level = 3
lto = "thin"
strip = true

[module]
id           = "com.core.seam-placer"
version      = "0.1.0"
display-name = "Seam Placer"
description  = "Core seam placer module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::PerimetersPostProcess"

[ir-access]
reads  = ["PerimeterIR"]
writes = ["PerimeterIR"]

[claims]
holds    = ["seam-placer"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
seam_mode = "string"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[module]
id           = "com.core.paint-segmentation"
version      = "0.1.0"
display-name = "Paint Segmentation"
description  = "Core paint segmentation module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-prepass@1.0.0"

[stage]
id = "PrePass::PaintSegmentation"

[ir-access]
reads  = ["MeshIR", "SurfaceClassificationIR", "LayerPlanIR"]
writes = ["PaintRegionIR"]

[claims]
holds    = []
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
# paint_region:<object_id>:<layer_index>:<semantic>:<value> = "x0,y0;x1,y1;..."
# Host-supplied per-region painted polygons; drained through
# paint-segmentation-output::push-paint-region (docs/03 world-prepass.wit).
"paint_region:*" = "string"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

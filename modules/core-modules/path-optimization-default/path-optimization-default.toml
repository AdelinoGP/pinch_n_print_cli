[module]
id           = "com.core.path-optimization-default"
version      = "0.1.0"
display-name = "Default Path Optimization"
description  = "Core default path-optimization module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::PathOptimization"

[ir-access]
reads  = ["PerimeterIR", "InfillIR", "SupportIR"]
writes = ["LayerCollectionIR"]

[claims]
holds    = ["path-optimizer"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
# Emit one `; path-optimization layer <n> regions=<count> entities=<e>`
# comment per layer. Defaults to true so the stage is observable end-
# to-end; can be disabled for byte-size-sensitive preset profiles.
[config.schema.path_optimization_emit_layer_markers]
type    = "bool"
default = true
display = "Emit Layer Markers"
group   = "Path Optimization"

[config.schema.retract_length]
type    = "float"
default = 0.8
display = "Retraction Length (mm)"
group   = "Travel Retraction"

[config.schema.retract_speed]
type    = "float"
default = 25.0
display = "Retraction Speed (mm/s)"
group   = "Travel Retraction"

[config.schema.travel_z_hop]
type    = "float"
default = 0.0
display = "Z-Hop Height (mm, 0 = disabled)"
group   = "Travel Retraction"

[config.schema.retract_mode]
type    = "enum"
values  = ["gcode", "firmware"]
default = "gcode"
display = "Retraction Mode"
group   = "Travel Retraction"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 1
layer-parallel-safe    = true

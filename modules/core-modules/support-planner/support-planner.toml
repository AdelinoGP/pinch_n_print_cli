[module]
id           = "com.core.support-planner"
version      = "0.1.0"
display-name = "Support Planner"
description  = "Emits SupportPlanIR from coarse SupportGeometryIR inside PrePass::SupportGeometry"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-prepass@1.0.0"

[stage]
id = "PrePass::SupportGeometry"

[ir-access]
reads  = ["MeshIR", "SurfaceClassificationIR", "LayerPlanIR", "RegionMapIR", "PaintRegionIR", "SupportGeometryIR"]
writes = ["SupportPlanIR"]

[claims]
holds    = ["support-planner"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
[config.schema.support_enabled]
type    = "bool"
default = true
display = "Support Enabled"
group   = "Support"

[config.schema.support_branch_angle_deg]
type    = "float"
default = 45.0
min     = 0.0
max     = 75.0
display = "Support Branch Angle"
group   = "Support"

[config.schema.support_branch_merge_distance_mm]
type    = "float"
default = 0.8
min     = 0.1
max     = 5.0
display = "Support Branch Merge Distance"
group   = "Support"

[config.schema.support_max_branches_per_layer]
type    = "int"
default = 1024
min     = 1
max     = 10000
display = "Max Branches Per Layer"
group   = "Support"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Support"

[config.schema.support_layer_height_mm]
type    = "float"
default = 0.0
min     = 0.05
max     = 1.0
display = "Support Layer Height"
group   = "Support"

[config.schema.support_top_z_distance_mm]
type    = "float"
default = 0.0
min     = 0.0
max     = 5.0
display = "Support Top Z Distance"
group   = "Support"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 5
layer-parallel-safe    = false

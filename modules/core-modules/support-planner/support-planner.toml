[module]
id           = "com.core.support-planner"
version      = "0.1.0"
display-name = "Support Planner"
description  = "Emits SupportPlanIR from coarse SupportGeometryIR inside PrePass::SupportGeometry"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-prepass"

[stage]
id = "PrePass::SupportGeometry"

[ir-access]
reads  = ["MeshIR", "SurfaceClassificationIR", "LayerPlanIR", "RegionMapIR", "PaintRegionIR", "SupportGeometryIR"]
writes = ["SupportPlanIR"]

[claims]
holds    = ["support-planner"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.support_enabled]
type    = "bool"
default = true
display = "Support Enabled"
group   = "Support"

[config.schema.tree_support_branch_angle]
type    = "float"
default = 45.0
min     = 0.0
max     = 75.0
display = "Tree Support Branch Angle"
group   = "Support"

[config.schema.tree_support_branch_diameter]
type    = "float"
default = 5.0
min     = 0.5
max     = 20.0
display = "Tree Support Branch Diameter"
group   = "Support"

[config.schema.tree_support_branch_diameter_angle]
type    = "float"
default = 5.0
min     = 0.0
max     = 90.0
display = "Tree Support Branch Diameter Angle"
group   = "Support"

[config.schema.tree_support_branch_distance]
type    = "float"
default = 1.0
min     = 0.1
max     = 10.0
display = "Tree Support Branch Distance"
group   = "Support"

[config.schema.tree_support_wall_count]
type    = "int"
default = 1
min     = 1
max     = 10
display = "Tree Support Wall Count"
group   = "Support"

[config.schema.support_raft_layers]
type    = "int"
default = 0
min     = 0
max     = 20
display = "Support Raft Layers"
group   = "Support"

[config.schema.raft_first_layer_density]
type    = "float"
default = 0.4
min     = 0.0
max     = 1.0
display = "Raft First Layer Density"
group   = "Support"

[config.schema.base_raft_layers]
type    = "int"
default = 1
min     = 0
max     = 20
display = "Base Raft Layers"
group   = "Support"

[config.schema.interface_raft_layers]
type    = "int"
default = 0
min     = 0
max     = 20
display = "Interface Raft Layers"
group   = "Support"

[config.schema.support_interface_top_layers]
type    = "int"
default = 2
min     = 0
max     = 10
display = "Support Interface Top Layers"
group   = "Support"

# Not yet implemented — see docs/specs/support-modules-orca-port.md
[config.schema.support_interface_bottom_layers]
type    = "int"
default = -1
min     = -1
max     = 10
display = "Support Interface Bottom Layers"
group   = "Support"

[config.schema.tree_support_interface_spacing_mm]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Tree Support Interface Spacing"
group   = "Support"

[config.schema.support_layer_height_mm]
type    = "float"
default = 0.0
min     = 0.05
max     = 1.0
display = "Support Layer Height"
group   = "Support"

[config.schema.support_top_z_distance_mm]
type    = "float"
default = 0.0
min     = 0.0
max     = 5.0
display = "Support Top Z Distance"
group   = "Support"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 5
layer-parallel-safe    = false

[module]
id           = "com.core.support-surface-ironing"
version      = "0.1.0"
display-name = "Support Surface Ironing"
description  = "Core support surface ironing module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer"

[stage]
id = "Layer::SupportPostProcess"

[ir-access]
reads  = ["SupportIR"]
writes = ["SupportIR"]

[claims]
holds    = []
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.ironing_enabled]
type    = "bool"
default = false
display = "Ironing Enabled"
group   = "Support"

[config.schema.ironing_speed]
type    = "float"
default = 30.0
min     = 1.0
max     = 300.0
display = "Ironing Speed"
group   = "Support"

[config.schema.ironing_flow_rate]
type    = "float"
default = 100.0
min     = 1.0
max     = 200.0
display = "Ironing Flow Rate"
group   = "Support"

[config.schema.ironing_spacing]
type    = "float"
default = 0.1
min     = 0.01
max     = 1.0
display = "Ironing Spacing"
group   = "Support"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Support"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[module]
id           = "com.core.skirt-brim"
version      = "0.1.0"
display-name = "Skirt Brim"
description  = "Core skirt brim module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-finalization@1.0.0"

[stage]
id = "PostPass::LayerFinalization"

[ir-access]
reads  = ["LayerCollectionIR"]
writes = ["LayerCollectionIR.skirt-brim"]

[claims]
holds    = []
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.skirt_brim_enabled]
type    = "bool"
default = true
display = "Skirt/Brim Enabled"
group   = "Skirt/Brim"

[config.schema.skirt_loops]
type    = "int"
default = 6
min     = 0
max     = 20
display = "Skirt Loops"
group   = "Skirt/Brim"

[config.schema.skirt_distance]
type    = "float"
default = 3.0
min     = 0.0
max     = 20.0
display = "Skirt Distance"
group   = "Skirt/Brim"

[config.schema.skirt_height]
type    = "int"
default = 1
min     = 1
max     = 10
display = "Skirt Height"
group   = "Skirt/Brim"

[config.schema.brim_width]
type    = "float"
default = 8.0
min     = 0.0
max     = 30.0
display = "Brim Width"
group   = "Skirt/Brim"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Skirt/Brim"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = false

[module]
id           = "com.core.lightning-infill"
version      = "0.1.0"
display-name = "Lightning Infill"
description  = "Core lightning infill module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Infill"

[ir-access]
reads  = ["SliceIR"]
writes = ["InfillIR"]

[claims]
holds    = ["infill-generator", "claim:sparse-fill"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "4.0.0"

[config.schema]
[config.schema.infill_density]
type    = "float"
default = 20.0
min     = 0.0
max     = 100.0
display = "Infill Density"
group   = "Infill"

[config.schema.infill_speed]
type    = "float"
default = 60.0
min     = 1.0
max     = 300.0
display = "Infill Speed"
group   = "Infill"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Infill"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

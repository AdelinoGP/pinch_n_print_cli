[module]
id           = "com.core.arachne-perimeters"
version      = "0.1.0"
display-name = "Arachne Perimeters"
description  = "Arachne variable-width perimeter generator. Produces perimeter walls via the Arachne/WallToolPaths pipeline (skeletal-trapezoidation graph + beading-strategy stack); selected when wall_generator = \"arachne\" (default \"classic\", see D-112-WALL-GENERATOR-SELECT). Claim-holds Layer::Perimeters and is incompatible with com.core.classic-perimeters."
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Perimeters"

[ir-access]
reads  = ["SliceIR", "PaintRegionIR"]
writes = ["PerimeterIR"]

[claims]
holds    = ["perimeter-generator"]
requires = []

[compatibility]
incompatible-with = ["com.core.classic-perimeters"]
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]

  # ── BeadingStrategy stack (packet 111, T-218) ────────────────────────────
  # Pure config registration only; not yet consumed by run_perimeters (P112's
  # T-230 wires these into BeadingStrategyFactory::create_stack). Defaults are
  # in slicer units (1 unit = 100 nm) unless noted; see
  # docs/15_config_keys_reference.md "Arachne beading strategy stack" for the
  # full per-key OrcaSlicer PrintConfig.cpp provenance and internal
  # Rust-field mapping notes.

  # ── Physical / process parameters (packet 150, Step 4) ──────────────────
  # Plain mm floats (docs/08_coordinate_system.md Z-axis convention / physical
  # spec fields) — no scaled-units conversion. Used to (a) resolve percent-typed
  # keys below against nozzle_diameter as base, and (b) convert configured line
  # width to Flow SPACING via slicer_core::flow::line_width_to_spacing before
  # handing widths to the beading pipeline (AC-3).

  [config.schema.layer_height]
  type        = "float"
  default     = 0.2
  min         = 0.01
  max         = 1.0
  unit        = "mm"
  display     = "Layer height"
  description = "Current layer height in mm. Mirrors layer-planner-default's own layer_height key (same convention: plain mm float, not scaled units). Consumed by arachne_params_from_config to convert the wall line widths to Flow spacing via line_width_to_spacing (AC-3)."
  group       = "Arachne"
  advanced    = true

  [config.schema.nozzle_diameter]
  type        = "float"
  default     = 0.4
  min         = 0.01
  unit        = "mm"
  display     = "Nozzle diameter"
  description = "Nozzle diameter in mm, plain float (matches classic-perimeters' own nozzle_diameter key convention). Consumed by arachne_params_from_config as the Flow-spacing nozzle_diameter clamp input and as the resolution base for percent-typed keys (min_feature_size, wall_transition_length)."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_feature_size]
  type        = "percent"
  default     = "25%"
  min         = 0
  unit        = "%"
  display     = "Minimum feature size"
  description = "Below this thickness a region is too narrow for normal bead distribution and is widened instead. Maps to WideningBeadingStrategy's internal min_input_width field. OrcaSlicer coPercent default 25% of nozzle diameter (PrintConfig.cpp:7217-7226). Retyped to percent (packet 150, D-104h parity fix) so it rescales with nozzle diameter instead of a pre-resolved absolute; base-value resolution against nozzle diameter is wired in a later packet-150 step."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_bead_width]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Minimum bead width"
  description = "Fixed bead width WideningBeadingStrategy emits for regions below min_feature_size. OrcaSlicer coPercent default 100% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_filter_deviation]
  type        = "float"
  default     = 1000
  min         = 0
  unit        = "units"
  display     = "Wall transition filter deviation"
  description = "Margin extending the extrusion-width range to reduce back-and-forth transitions between wall counts. Maps to DistributedBeadingStrategy's internal transition_filter_dist field and is consumed by the centrality/propagation path (skeletal_trapezoidation/centrality.rs:162, propagation.rs:670,719). OrcaSlicer coPercent default 25% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_length]
  type        = "percent"
  default     = "100%"
  min         = 0
  unit        = "%"
  display     = "Wall transition length"
  description = "Space allotted to split/join wall segments when transitioning between wall counts. Maps to DistributedBeadingStrategy's internal default_transition_length field (reserved, not yet read by compute). OrcaSlicer coPercent default 100% of nozzle diameter (PrintConfig.cpp:7169-7178). Retyped to percent (packet 150, D-104h parity fix) so it rescales with nozzle diameter instead of a pre-resolved absolute; base-value resolution against nozzle diameter is wired in a later packet-150 step."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_angle]
  type        = "float"
  default     = 10.0
  min         = 0.0
  max         = 180.0
  unit        = "deg"
  display     = "Wall transition angle"
  description = "Threshold wedge angle above which no wall-count transition occurs. Not yet consumed by any shipped strategy in this packet. Matches OrcaSlicer's coFloat default of 10.0 degrees exactly."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_distribution_count]
  type        = "int"
  default     = 1
  min         = 1
  display     = "Wall distribution count"
  description = "Gaussian decay radius, in bead-count units, used by DistributedBeadingStrategy's surplus/deficit redistribution (maps directly to its internal distribution_count field). Matches OrcaSlicer's coInt default of 1 exactly."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_length_factor]
  type        = "float"
  default     = 0.5
  min         = 0.0
  max         = 2.0
  unit        = "ratio"
  display     = "Minimum length factor"
  description = "Dimensionless multiplier consumed by the not-yet-ported removeSmallLines step (T-227): drops odd, non-closed lines shorter than min_length_factor * min_width. Not yet consumed by any strategy in this packet."
  group       = "Arachne"
  advanced    = true

  [config.schema.initial_layer_min_bead_width]
  type        = "float"
  default     = 3400
  min         = 0
  unit        = "units"
  display     = "Initial layer minimum bead width"
  description = "Minimum wall width for the first layer. Not yet consumed by any strategy in this packet. OrcaSlicer coPercent default 85% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.outer_wall_offset]
  type        = "float"
  default     = 0
  min         = 0
  unit        = "units"
  display     = "Outer wall offset"
  description = "Inward offset applied to the outer wall's toolpath location by OuterWallInsetBeadingStrategy; 0 disables the decorator's offset. Not a user-facing OrcaSlicer PrintConfig.cpp option — an internal Arachne algorithm parameter (coord_t) threaded through BeadingStrategyFactory."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_central_distance]
  type        = "float"
  default     = 0
  min         = 0
  unit        = "units"
  display     = "Minimum central distance"
  description = "Depth floor (mm) for filter_central's stage 1: an edge whose deepest endpoint never reaches this distance from the boundary is never central. Maps to ArachneParams::min_central_distance. Not a user-facing OrcaSlicer PrintConfig.cpp option — an internal Arachne algorithm parameter threaded through the pipeline."
  group       = "Arachne"
  advanced    = true

  [config.schema.visvalingam_area_threshold]
  type        = "float"
  default     = 100
  min         = 0
  unit        = "units"
  display     = "Visvalingam area threshold"
  description = "Visvalingam-Whyatt width-weighted area threshold (mm²) for simplify_toolpaths. Maps to ArachneParams::visvalingam_area_threshold. Default 100 units = 0.01 mm², matching the pipeline's post-process default."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_width]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Minimum width"
  description = "Nominal width (mm) used by remove_small_lines' length threshold. Maps to ArachneParams::min_width. Default 4000 units = 0.4mm, matching this codebase's common 0.4mm line-width convention."
  group       = "Arachne"
  advanced    = true

  [config.schema.max_bead_count]
  type        = "int"
  default     = 0
  min         = 0
  display     = "Maximum bead count"
  description = "Cap threshold consumed by LimitedBeadingStrategy. Not a user-facing OrcaSlicer PrintConfig.cpp option — upstream computes it internally as 2 * inset_count in Arachne/WallToolPaths.cpp:525, which is ALWAYS EVEN (LimitedBeadingStrategy's ctor warns on odd counts, and its odd-center compute branch parks the whole surplus thickness in one wide centre bead — a physically impossible extrusion). Default 0 = auto-derive 2 * wall_count (even, tracks wall_count) rather than shadowing it with a fixed odd cap. A positive override is honoured verbatim (advanced/cap-testing only)."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_count]
  type        = "int"
  default     = 3
  min         = 1
  display     = "Wall count (line perimeters)"
  description = "User-facing per-region perimeter count; consumed as max_bead_count = 2 × wall_count (Orca WallToolPaths.cpp:525)."
  group       = "Walls"

  [config.schema.wall_direction]
  type        = "string"
  default     = "counter_clockwise"
  display     = "Wall direction (winding)"
  description = "OrcaSlicer coEnum key wall_direction (PrintConfig.cpp:2188-2198, default CounterClockwise); values: counter_clockwise (default, holes wound opposite) | clockwise. Contour (ExteriorSurface) winding is forced CCW or CW; holes are always wound opposite the contour (PerimeterGenerator.cpp:527-545)."
  group       = "Walls"

  # D-160: the Arachne-internal keys `optimal_width` and
  # `preferred_bead_width_outer` are RETIRED. Canonical never exposes them —
  # PerimeterGenerator derives bead_width_x from perimeter_flow (the inner
  # wall's flow) and bead_width_0 from ext_perimeter_flow (the outer wall's
  # flow) — so PnP now derives them from the user-facing wall-width keys
  # below, exactly like classic-perimeters. ArachneParams' struct FIELDS keep
  # the canonical names; only the config keys are gone (ADR-0043).

  [config.schema.inner_wall_line_width]
  type        = "float"
  default     = 0.4
  min         = 0.1
  max         = 2.0
  display     = "Inner Wall Line Width"
  description = "Inner wall extrusion line width in mm (plain mm, not scaled units). Canonical bead_width_x: PerimeterGenerator passes perimeter_spacing = perimeter_flow.scaled_spacing() into WallToolPaths; arachne_params_from_config applies the same width->spacing conversion (line_width_to_spacing) before feeding the beading strategy stack, and emission converts back (VariableWidth.cpp::thick_polyline_to_multi_path)."
  group       = "Walls"

  [config.schema.detect_thin_wall]
  type        = "bool"
  default     = false
  display     = "Detect thin wall"
  description = "Gates whether WideningBeadingStrategy is wrapped into the BeadingStrategyFactory::create_stack composition at all (maps to the internal Arachne print_thin_walls parameter). false means WideningBeadingStrategy is absent from the stack entirely, not merely a no-op. PnP exposes this as a config key defaulting to false; OrcaSlicer's analog is fill_outline_gaps, a hardcoded constexpr bool = true in WallToolPaths.hpp:18, so PnP's default differs from upstream by design."
  group       = "Arachne"
  advanced    = true

  [config.schema.outer_wall_line_width]
  type        = "float"
  default     = 0.4
  min         = 0.1
  max         = 2.0
  display     = "Outer Wall Line Width"
  description = "Outer wall extrusion line width in mm (plain mm, not scaled units). Canonical bead_width_0: PerimeterGenerator passes ext_perimeter_spacing = ext_perimeter_flow.scaled_spacing() into WallToolPaths; maps to ArachneParams::preferred_bead_width_outer (RedistributeBeadingStrategy's optimal_width_outer, and the base optimal_width when max_bead_count <= 2, per BeadingStrategyFactory::makeStrategy). Also feeds the precise_outer_wall inset formula, which needs the true ext_perimeter_width."
  group       = "Walls"

  # ── Wall sequencing / seam parity (packet 148) ───────────────────────────
  # Registered here to match classic-perimeters.toml byte-for-byte (AC-7);
  # not yet consumed by run_perimeters in this step.

[config.schema.precise_outer_wall]
type    = "bool"
default = false
display = "Precise outer wall (gated on wall_sequence=InnerOuter)"
group   = "Walls"

[config.schema.wall_sequence]
type    = "string"
default = "InnerOuter"
display = "Wall sequence (InnerOuter, OuterInner, InnerOuterInner)"
group   = "Walls"

[config.schema.seam_candidate_angle_threshold_deg]
type    = "float"
default = 30.0
min     = 0.0
max     = 180.0
display = "Seam candidate sharp-corner angle threshold (degrees)"
group   = "Seam"

# ── OrcaSlicer overhang/bridging/vase config wiring (packet 149) ────────
# Mixed: alternate_extra_wall, spiral_vase, sparse_infill_density, bridge_flow,
# and thick_bridges ARE consumed by run_perimeters (D3 alternating-wall
# max_bead_count gate / D4 bridge flow factor). The remaining keys are
# registration only, behavior deferred per D-104c/D-104d.
# Grepped modules/core-modules/*/*.toml first: none of these 11 keys were
# already registered here, except extra_perimeters_on_overhangs and
# only_one_wall_top, whose section shape is copied verbatim from
# classic-perimeters.toml so the two manifests mirror each other.

[config.schema.detect_overhang_wall]
type        = "bool"
default     = true
display     = "Detect overhang wall"
description = "OrcaSlicer coBool key detect_overhang_wall (Orca default 1/true); gates the overhang-wall speed/reversal/extra-perimeter special-casing path. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse]
type        = "bool"
default     = false
display     = "Reverse on overhang"
description = "OrcaSlicer coBool key overhang_reverse; reverses the print direction of wall loops on odd layers containing overhang wall segments (anti-warping). Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse_internal_only]
type        = "bool"
default     = false
display     = "Reverse on overhang (internal walls only)"
description = "OrcaSlicer coBool key overhang_reverse_internal_only; when true, only internal (non-outer) overhang wall lines are reversed. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse_threshold]
type        = "float_or_percent"
default     = "0.0"
min         = 0.0
max         = 10.0
unit        = "mm"
display     = "Overhang reverse threshold"
description = "OrcaSlicer coFloatOrPercent key overhang_reverse_threshold; when 0, the overhang detection treats every overhang as steep and reverses wall direction (Orca PerimeterGenerator.cpp:68-77). Advisory for the G7 test; full steep-detection logic is out of scope for packet 151."
group       = "Walls"

[config.schema.extra_perimeters_on_overhangs]
type    = "bool"
default = false
display = "Extra perimeter on overhangs (adds one wall loop inside region.overhang_areas())"
group   = "Walls"

[config.schema.min_width_top_surface]
type        = "float_or_percent"
default     = "300%"
min         = 0.0
unit        = "%"
display     = "Minimum top surface width"
description = "OrcaSlicer coFloatOrPercent key min_width_top_surface, default 300% of inner wall line width (PrintConfig.cpp:1498-1511). Retyped to float_or_percent (packet 150, D-104h parity fix); base-value resolution against inner_wall_line_width is wired in a later packet-150 step. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.alternate_extra_wall]
type        = "bool"
default     = false
display     = "Alternate extra wall"
description = "OrcaSlicer coBool key alternate_extra_wall; adds an extra perimeter wall on alternating layers to correct over-extrusion patterns. Consumed by run_perimeters: D3 gate bumps ArachneParams.max_bead_count by +2 on odd layers when !spiral_vase && sparse_infill_density > 0."
group       = "Walls"

[config.schema.bridge_flow]
type        = "float"
default     = 1.0
min         = 0.0
display     = "Bridge flow ratio"
description = "OrcaSlicer coFloat key bridge_flow; flow-rate multiplier applied to bridging extrusions. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow, applied at is_bridge vertices."
group       = "Quality"

[config.schema.thick_bridges]
type        = "bool"
default     = false
display     = "Thick bridges"
description = "OrcaSlicer coBool key thick_bridges; when true, bridge extrusions use full un-scarfed layer height instead of the thin/adaptive bridge height. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow (thick_bridges=true short-circuits the ratio to 1.0)."
group       = "Quality"

[config.schema.spiral_vase]
type        = "bool"
default     = false
display     = "Spiral vase mode"
description = "OrcaSlicer coBool key spiral_vase; enables spiral/vase mode (continuous single-wall Z-ramp, no top layers, only one wall). No existing registration found elsewhere in modules/core-modules/*/*.toml (grepped). Consumed by run_perimeters: part of the D3 odd-layer max_bead_count gate (alternate_extra_wall applies only when !spiral_vase)."
group       = "Walls"

[config.schema.sparse_infill_density]
type        = "float"
default     = 20.0
min         = 0.0
max         = 100.0
unit        = "%"
display     = "Sparse infill density"
description = "OrcaSlicer coPercent key sparse_infill_density, default 20%. No existing registration found elsewhere in modules/core-modules/*/*.toml (grepped); represented here as a plain percent float. Consumed by run_perimeters: part of the D3 odd-layer max_bead_count gate (alternate_extra_wall applies only when sparse_infill_density > 0)."
group       = "Infill"

[config.schema.only_one_wall_top]
type    = "bool"
default = false
display = "Only one wall on top surfaces"
group   = "Walls"

[config.schema.only_one_wall_first_layer]
type        = "bool"
default     = false
display     = "Only one wall on first layer"
description = "OrcaSlicer coBool key only_one_wall_first_layer; on layer 0, forces a single wall (max_bead_count=2) instead of wall_count (Orca PerimeterGenerator.cpp:2137-2139: loop_number = 0)."
group       = "Walls"

  # ── Arachne wall simplification tolerances (packet 151, Step 5 / G9) ──────
  # OrcaSlicer coFloat keys wall_maximum_resolution /
  # wall_maximum_deviation REPLACE meshfix_maximum_resolution /
  # meshfix_maximum_deviation for the Arachne wall path (Orca
  # WallToolPaths.cpp:487-503,702-719). Values are plain mm (docs/08 Z-axis
  # convention); wired directly (no min()/merge) into
  # ArachneParams.smallest_line_segment_squared / allowed_error_distance_squared
  # as mm² (squared). Third tolerance meshfix_maximum_extrusion_area_deviation
  # is a distinct parameter and intentionally NOT replaced here.

  [config.schema.wall_maximum_resolution]
  type        = "float"
  default     = 0.5
  min         = 0.001
  max         = 10.0
  unit        = "mm"
  display     = "Wall maximum resolution"
  description = "OrcaSlicer coFloat key wall_maximum_resolution; minimum line segment length squared (mm²) used by Arachne's wall simplification. Replaces meshfix_maximum_resolution for the wall path (Orca WallToolPaths.cpp:487-503,702-719). Default 0.5 mm (Orca default)."
  group       = "Walls"

  [config.schema.wall_maximum_deviation]
  type        = "float"
  default     = 0.025
  min         = 0.0001
  max         = 1.0
  unit        = "mm"
  display     = "Wall maximum deviation"
  description = "OrcaSlicer coFloat key wall_maximum_deviation; allowed positional error (mm², squared) for Arachne's wall simplification. Replaces meshfix_maximum_deviation for the wall path (Orca WallToolPaths.cpp:487-503,702-719). Default 0.025 mm (Orca default)."
  group       = "Walls"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

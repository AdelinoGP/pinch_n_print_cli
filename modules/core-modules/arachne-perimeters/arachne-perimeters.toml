[module]
id           = "com.core.arachne-perimeters"
version      = "0.1.0"
display-name = "Arachne Perimeters"
description  = "Arachne variable-width perimeter generator. Produces perimeter walls via the Arachne/WallToolPaths pipeline (skeletal-trapezoidation graph + beading-strategy stack); selected when wall_generator = \"arachne\" (default \"classic\", see D-112-WALL-GENERATOR-SELECT). Claim-holds Layer::Perimeters and is incompatible with com.core.classic-perimeters."
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Perimeters"

[ir-access]
reads  = ["SliceIR", "PaintRegionIR"]
writes = ["PerimeterIR"]

[claims]
holds    = ["perimeter-generator"]
requires = []

[compatibility]
incompatible-with = ["com.core.classic-perimeters"]
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]

  # ── BeadingStrategy stack (packet 111, T-218) ────────────────────────────
  # Pure config registration only; not yet consumed by run_perimeters (P112's
  # T-230 wires these into BeadingStrategyFactory::create_stack). Defaults are
  # in slicer units (1 unit = 100 nm) unless noted; see
  # docs/15_config_keys_reference.md "Arachne beading strategy stack" for the
  # full per-key OrcaSlicer PrintConfig.cpp provenance and internal
  # Rust-field mapping notes.

  [config.schema.min_feature_size]
  type        = "float"
  default     = 1000
  min         = 0
  unit        = "units"
  display     = "Minimum feature size"
  description = "Below this thickness a region is too narrow for normal bead distribution and is widened instead. Maps to WideningBeadingStrategy's internal min_input_width field. OrcaSlicer coPercent default 25% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_bead_width]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Minimum bead width"
  description = "Fixed bead width WideningBeadingStrategy emits for regions below min_feature_size. OrcaSlicer coPercent default 100% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_filter_deviation]
  type        = "float"
  default     = 1000
  min         = 0
  unit        = "units"
  display     = "Wall transition filter deviation"
  description = "Margin extending the extrusion-width range to reduce back-and-forth transitions between wall counts. Maps to DistributedBeadingStrategy's internal transition_filter_dist field and is consumed by the centrality/propagation path (skeletal_trapezoidation/centrality.rs:162, propagation.rs:670,719). OrcaSlicer coPercent default 25% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_length]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Wall transition length"
  description = "Space allotted to split/join wall segments when transitioning between wall counts. Maps to DistributedBeadingStrategy's internal default_transition_length field (reserved, not yet read by compute). OrcaSlicer coPercent default 100% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_transition_angle]
  type        = "float"
  default     = 10.0
  min         = 0.0
  max         = 180.0
  unit        = "deg"
  display     = "Wall transition angle"
  description = "Threshold wedge angle above which no wall-count transition occurs. Not yet consumed by any shipped strategy in this packet. Matches OrcaSlicer's coFloat default of 10.0 degrees exactly."
  group       = "Arachne"
  advanced    = true

  [config.schema.wall_distribution_count]
  type        = "int"
  default     = 1
  min         = 1
  display     = "Wall distribution count"
  description = "Gaussian decay radius, in bead-count units, used by DistributedBeadingStrategy's surplus/deficit redistribution (maps directly to its internal distribution_count field). Matches OrcaSlicer's coInt default of 1 exactly."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_length_factor]
  type        = "float"
  default     = 0.5
  min         = 0.0
  max         = 2.0
  unit        = "ratio"
  display     = "Minimum length factor"
  description = "Dimensionless multiplier consumed by the not-yet-ported removeSmallLines step (T-227): drops odd, non-closed lines shorter than min_length_factor * min_width. Not yet consumed by any strategy in this packet."
  group       = "Arachne"
  advanced    = true

  [config.schema.initial_layer_min_bead_width]
  type        = "float"
  default     = 3400
  min         = 0
  unit        = "units"
  display     = "Initial layer minimum bead width"
  description = "Minimum wall width for the first layer. Not yet consumed by any strategy in this packet. OrcaSlicer coPercent default 85% of nozzle diameter; resolved here against a 0.4mm nozzle."
  group       = "Arachne"
  advanced    = true

  [config.schema.outer_wall_offset]
  type        = "float"
  default     = 0
  min         = 0
  unit        = "units"
  display     = "Outer wall offset"
  description = "Inward offset applied to the outer wall's toolpath location by OuterWallInsetBeadingStrategy; 0 disables the decorator's offset. Not a user-facing OrcaSlicer PrintConfig.cpp option — an internal Arachne algorithm parameter (coord_t) threaded through BeadingStrategyFactory."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_central_distance]
  type        = "float"
  default     = 0
  min         = 0
  unit        = "units"
  display     = "Minimum central distance"
  description = "Depth floor (mm) for filter_central's stage 1: an edge whose deepest endpoint never reaches this distance from the boundary is never central. Maps to ArachneParams::min_central_distance. Not a user-facing OrcaSlicer PrintConfig.cpp option — an internal Arachne algorithm parameter threaded through the pipeline."
  group       = "Arachne"
  advanced    = true

  [config.schema.visvalingam_area_threshold]
  type        = "float"
  default     = 100
  min         = 0
  unit        = "units"
  display     = "Visvalingam area threshold"
  description = "Visvalingam-Whyatt width-weighted area threshold (mm²) for simplify_toolpaths. Maps to ArachneParams::visvalingam_area_threshold. Default 100 units = 0.01 mm², matching the pipeline's post-process default."
  group       = "Arachne"
  advanced    = true

  [config.schema.min_width]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Minimum width"
  description = "Nominal width (mm) used by remove_small_lines' length threshold. Maps to ArachneParams::min_width. Default 4000 units = 0.4mm, matching this codebase's common line_width / optimal_width convention."
  group       = "Arachne"
  advanced    = true

  [config.schema.max_bead_count]
  type        = "int"
  default     = 9
  min         = 1
  display     = "Maximum bead count"
  description = "Cap threshold consumed by LimitedBeadingStrategy. Not a user-facing OrcaSlicer PrintConfig.cpp option — upstream computes it internally as 2 * inset_count (capped) in Arachne/WallToolPaths.cpp; no literal upstream constant exists to cite."
  group       = "Arachne"
  advanced    = true

  [config.schema.optimal_width]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Optimal bead width"
  description = "Target bead width used when there is no surplus/deficit thickness to redistribute. Maps directly to DistributedBeadingStrategy's internal optimal_width field (name matches verbatim). Not a user-facing OrcaSlicer PrintConfig.cpp option — upstream sets it internally from preferred_bead_width_outer/preferred_bead_width_inner in BeadingStrategyFactory.cpp; default mirrors this codebase's common 0.4mm line_width. Refined role: now serves as upstream's preferred_bead_width_inner (used when max_bead_count > 2); see preferred_bead_width_outer for the max_bead_count <= 2 case."
  group       = "Arachne"
  advanced    = true

  [config.schema.detect_thin_wall]
  type        = "bool"
  default     = false
  display     = "Detect thin wall"
  description = "Gates whether WideningBeadingStrategy is wrapped into the BeadingStrategyFactory::create_stack composition at all (maps to the internal Arachne print_thin_walls parameter). false means WideningBeadingStrategy is absent from the stack entirely, not merely a no-op. PnP exposes this as a config key defaulting to false; OrcaSlicer's analog is fill_outline_gaps, a hardcoded constexpr bool = true in WallToolPaths.hpp:18, so PnP's default differs from upstream by design."
  group       = "Arachne"
  advanced    = true

  [config.schema.preferred_bead_width_outer]
  type        = "float"
  default     = 4000
  min         = 0
  unit        = "units"
  display     = "Preferred bead width (outer)"
  description = "Target width for the outermost/innermost bead. Used unconditionally by RedistributeBeadingStrategy's optimal_width_outer parameter, and conditionally (when max_bead_count <= 2) as DistributedBeadingStrategy's/WideningBeadingStrategy's base optimal_width instead of the optimal_width key. Maps to upstream's preferred_bead_width_outer (BeadingStrategyFactory.cpp:50-97). Default 4000 units (0.4mm) matches this codebase's optimal_width convention rather than upstream's raw factory default of scaled(0.0005)=0.5mm=5000 units."
  group       = "Arachne"
  advanced    = true

  # ── Wall sequencing / seam parity (packet 148) ───────────────────────────
  # Registered here to match classic-perimeters.toml byte-for-byte (AC-7);
  # not yet consumed by run_perimeters in this step.

[config.schema.precise_outer_wall]
type    = "bool"
default = false
display = "Precise outer wall (gated on wall_sequence=InnerOuter)"
group   = "Walls"

[config.schema.wall_sequence]
type    = "string"
default = "InnerOuter"
display = "Wall sequence (InnerOuter, OuterInner, InnerOuterInner)"
group   = "Walls"

[config.schema.seam_candidate_angle_threshold_deg]
type    = "float"
default = 30.0
min     = 0.0
max     = 180.0
display = "Seam candidate sharp-corner angle threshold (degrees)"
group   = "Seam"

# ── OrcaSlicer overhang/bridging/vase config wiring (packet 149) ────────
# Mixed: alternate_extra_wall, spiral_vase, sparse_infill_density, bridge_flow,
# and thick_bridges ARE consumed by run_perimeters (D3 alternating-wall
# max_bead_count gate / D4 bridge flow factor). The remaining keys are
# registration only, behavior deferred per D-104c/D-104d.
# Grepped modules/core-modules/*/*.toml first: none of these 11 keys were
# already registered here, except extra_perimeters_on_overhangs and
# only_one_wall_top, whose section shape is copied verbatim from
# classic-perimeters.toml so the two manifests mirror each other.

[config.schema.detect_overhang_wall]
type        = "bool"
default     = true
display     = "Detect overhang wall"
description = "OrcaSlicer coBool key detect_overhang_wall (Orca default 1/true); gates the overhang-wall speed/reversal/extra-perimeter special-casing path. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse]
type        = "bool"
default     = false
display     = "Reverse on overhang"
description = "OrcaSlicer coBool key overhang_reverse; reverses the print direction of wall loops on odd layers containing overhang wall segments (anti-warping). Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse_internal_only]
type        = "bool"
default     = false
display     = "Reverse on overhang (internal walls only)"
description = "OrcaSlicer coBool key overhang_reverse_internal_only; when true, only internal (non-outer) overhang wall lines are reversed. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.extra_perimeters_on_overhangs]
type    = "bool"
default = false
display = "Extra perimeter on overhangs (adds one wall loop inside region.overhang_areas())"
group   = "Walls"

[config.schema.min_width_top_surface]
type        = "float"
default     = 1.2
min         = 0.0
unit        = "mm"
display     = "Minimum top surface width"
description = "OrcaSlicer coFloatOrPercent key min_width_top_surface, default 300% of line width (≈1.2mm at the common 0.4mm line width). No coFloatOrPercent/literal-percent representation precedent found in modules/core-modules/*/*.toml (grepped); represented here as a plain mm float per the docs/03_wit_and_manifest.md unit=\"mm\" convention (see tree_support_branch_diameter). Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.alternate_extra_wall]
type        = "bool"
default     = false
display     = "Alternate extra wall"
description = "OrcaSlicer coBool key alternate_extra_wall; adds an extra perimeter wall on alternating layers to correct over-extrusion patterns. Consumed by run_perimeters: D3 gate bumps ArachneParams.max_bead_count by +2 on odd layers when !spiral_vase && sparse_infill_density > 0."
group       = "Walls"

[config.schema.bridge_flow]
type        = "float"
default     = 1.0
min         = 0.0
display     = "Bridge flow ratio"
description = "OrcaSlicer coFloat key bridge_flow; flow-rate multiplier applied to bridging extrusions. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow, applied at is_bridge vertices."
group       = "Quality"

[config.schema.thick_bridges]
type        = "bool"
default     = false
display     = "Thick bridges"
description = "OrcaSlicer coBool key thick_bridges; when true, bridge extrusions use full un-scarfed layer height instead of the thin/adaptive bridge height. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow (thick_bridges=true short-circuits the ratio to 1.0)."
group       = "Quality"

[config.schema.spiral_vase]
type        = "bool"
default     = false
display     = "Spiral vase mode"
description = "OrcaSlicer coBool key spiral_vase; enables spiral/vase mode (continuous single-wall Z-ramp, no top layers, only one wall). No existing registration found elsewhere in modules/core-modules/*/*.toml (grepped). Consumed by run_perimeters: part of the D3 odd-layer max_bead_count gate (alternate_extra_wall applies only when !spiral_vase)."
group       = "Walls"

[config.schema.sparse_infill_density]
type        = "float"
default     = 20.0
min         = 0.0
max         = 100.0
unit        = "%"
display     = "Sparse infill density"
description = "OrcaSlicer coPercent key sparse_infill_density, default 20%. No existing registration found elsewhere in modules/core-modules/*/*.toml (grepped); represented here as a plain percent float. Consumed by run_perimeters: part of the D3 odd-layer max_bead_count gate (alternate_extra_wall applies only when sparse_infill_density > 0)."
group       = "Infill"

[config.schema.only_one_wall_top]
type    = "bool"
default = false
display = "Only one wall on top surfaces"
group   = "Walls"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

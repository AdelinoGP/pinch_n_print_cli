[package]
name = "seam-planner-default"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Default seam planner implementing PrepassModule for SeamPlanning stage"

[dependencies]
faer = { version = "0.24", default-features = false, features = ["std"] }
slicer-ir = { path = "../../../crates/slicer-ir" }
slicer-schema = { path = "../../../crates/slicer-schema" }
slicer-sdk = { path = "../../../crates/slicer-sdk" }

[dev-dependencies]
slicer-sdk = { path = "../../../crates/slicer-sdk", features = ["test"] }

# Required by the `#[slicer_module]` macro's wasm32-only component export
# glue. On native builds the emitted `wit_bindgen::generate!` call is
# gated behind `#[cfg(target_arch = "wasm32")]` and never expanded.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wit-bindgen.workspace = true

[lints]
workspace = true

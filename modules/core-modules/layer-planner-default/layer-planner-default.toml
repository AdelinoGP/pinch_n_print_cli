[module]
id           = "com.core.layer-planner-default"
version      = "0.1.0"
display-name = "Default Layer Planner"
description  = "Core default layer planner module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-prepass@1.0.0"

[stage]
id = "PrePass::LayerPlanning"

[ir-access]
reads  = []
writes = []

[claims]
holds    = ["layer-planner"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
layer_height = "float"
first_layer_height = "float"
"object_height:*" = "float"
"layer_height:*" = "float"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[module]
id           = "com.core.layer-planner-default"
version      = "0.1.0"
display-name = "Default Layer Planner"
description  = "Core default layer planner module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-prepass@1.0.0"

[stage]
id = "PrePass::LayerPlanning"

[ir-access]
reads  = ["MeshIR", "SurfaceClassificationIR"]
writes = ["LayerPlanIR"]

[claims]
holds    = ["layer-planner"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
"object_height:*" = "float"
"layer_height:*" = "float"

[config.schema.layer_height]
type    = "float"
default = 0.2
min     = 0.01
max     = 1.0
display = "Layer Height"
group   = "Layer Planning"

[config.schema.first_layer_height]
type    = "float"
default = 0.3
min     = 0.01
max     = 1.0
display = "First Layer Height"
group   = "Layer Planning"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

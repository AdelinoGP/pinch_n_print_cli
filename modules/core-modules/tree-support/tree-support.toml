[module]
id           = "com.core.tree-support"
version      = "0.1.0"
display-name = "Tree Support"
description  = "Core tree support module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Support"

[ir-access]
reads  = ["SliceIR", "SurfaceClassificationIR", "PaintRegionIR", "SupportPlanIR"]
writes = ["SupportIR"]

[claims]
holds    = ["support-generator"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
[config.schema.support_enabled]
type    = "bool"
default = true
display = "Support Enabled"
group   = "Support"

[config.schema.support_density]
type    = "float"
default = 20.0
min     = 0.0
max     = 100.0
display = "Support Density"
group   = "Support"

[config.schema.support_angle]
type    = "float"
default = 60.0
min     = 0.0
max     = 90.0
display = "Support Angle"
group   = "Support"

[config.schema.support_speed]
type    = "float"
default = 50.0
min     = 1.0
max     = 300.0
display = "Support Speed"
group   = "Support"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Support"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

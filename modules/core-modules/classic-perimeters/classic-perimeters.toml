[module]
id           = "com.core.classic-perimeters"
version      = "0.1.0"
display-name = "Classic Perimeters"
description  = "Core classic perimeters module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer"

[stage]
id = "Layer::Perimeters"

[ir-access]
reads  = ["SliceIR", "PaintRegionIR"]
writes = ["PerimeterIR"]

[claims]
holds    = ["perimeter-generator"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.wall_count]
type    = "int"
default = 3
min     = 1
max     = 10
display = "Wall Count"
group   = "Walls"

[config.schema.extra_perimeters]
type    = "int"
default = 0
min     = 0
max     = 10
display = "Extra perimeters (per-region bonus wall count)"
group   = "Walls"

[config.schema.extra_perimeters_on_overhangs]
type    = "bool"
default = false
display = "Extra perimeter on overhangs (adds one wall loop inside region.overhang_areas())"
group   = "Walls"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Walls"

[config.schema.outer_wall_line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Outer Wall Line Width"
group   = "Walls"

[config.schema.inner_wall_line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Inner Wall Line Width"
group   = "Walls"

[config.schema.precise_outer_wall]
type    = "bool"
default = false
display = "Precise outer wall (gated on wall_sequence=InnerOuter)"
group   = "Walls"

[config.schema.wall_sequence]
type    = "string"
default = "InnerOuter"
display = "Wall sequence (InnerOuter, OuterInner, InnerOuterInner)"
group   = "Walls"

[config.schema.detect_thin_wall]
type    = "bool"
default = true
display = "Detect thin walls via medial-axis cascade"
group   = "Walls"

[config.schema.seam_candidate_angle_threshold_deg]
type    = "float"
default = 30.0
min     = 0.0
max     = 180.0
display = "Seam candidate sharp-corner angle threshold (degrees)"
group   = "Seam"

[config.schema.gap_infill_speed]
type    = "float"
default = 30.0
min     = 1.0
max     = 300.0
display = "Gap infill speed"
group   = "Quality"

[config.schema.filter_out_gap_fill]
type    = "float"
default = 0.5
min     = 0.0
max     = 5.0
display = "Minimum gap-fill segment length (mm)"
group   = "Quality"

[config.schema.gap_fill_medial_axis_on_painted]
type    = "bool"
default = false
display = "Run gap-fill/thin-wall medial axis on painted slices"
group   = "Quality"

[config.schema.slice_has_paint]
type    = "bool"
default = false
display = "Slice contains painted regions (host-injected)"
group   = "Quality"

[config.schema.outer_wall_speed]
type    = "float"
default = 30.0
min     = 1.0
max     = 300.0
display = "Outer Wall Speed"
group   = "Walls"

[config.schema.inner_wall_speed]
type    = "float"
default = 45.0
min     = 1.0
max     = 300.0
display = "Inner Wall Speed"
group   = "Walls"

[config.schema.perimeter_arc_tolerance]
type    = "float"
default = 0.0125
min     = 0.0
max     = 1.0
display = "Perimeter arc tolerance (mm)"
group   = "Quality"

[config.schema.only_one_wall_top]
type    = "bool"
default = false
display = "Only one wall on top surfaces"
group   = "Walls"

[config.schema.only_one_wall_first_layer]
type    = "bool"
default = false
display = "Only one wall on first layer"
group   = "Walls"

[config.schema.smaller_perimeter_line_width]
type    = "float"
default = 0.25
min     = 0.05
max     = 2.0
display = "Smaller perimeter line width (narrow-island override, mm)"
group   = "Walls"

[config.schema.smaller_perimeter_threshold_mm]
type    = "float"
default = 0.8
min     = 0.0
max     = 10.0
display = "Narrow-island width threshold (mm)"
group   = "Walls"

[config.schema.narrow_loop_length_threshold_mm]
type    = "float"
default = 10.0
min     = 0.0
max     = 1000.0
display = "Minimum longest-dimension for narrow-island classification (mm)"
group   = "Walls"

# ── OrcaSlicer overhang/bridging config wiring (packet 149) ─────────────
# Pure config registration only; not yet consumed. Grepped this file first:
# extra_perimeters_on_overhangs and only_one_wall_top already exist above
# (not duplicated); these 7 mirror arachne-perimeters.toml byte-for-byte.

[config.schema.detect_overhang_wall]
type        = "bool"
default     = true
display     = "Detect overhang wall"
description = "OrcaSlicer coBool key detect_overhang_wall (Orca default 1/true); gates the overhang-wall speed/reversal/extra-perimeter special-casing path. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse]
type        = "bool"
default     = false
display     = "Reverse on overhang"
description = "OrcaSlicer coBool key overhang_reverse; reverses the print direction of wall loops on odd layers containing overhang wall segments (anti-warping). Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.overhang_reverse_internal_only]
type        = "bool"
default     = false
display     = "Reverse on overhang (internal walls only)"
description = "OrcaSlicer coBool key overhang_reverse_internal_only; when true, only internal (non-outer) overhang wall lines are reversed. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.min_width_top_surface]
type        = "float"
default     = 1.2
min         = 0.0
unit        = "mm"
display     = "Minimum top surface width"
description = "OrcaSlicer coFloatOrPercent key min_width_top_surface, default 300% of line width (≈1.2mm at the common 0.4mm line width). No coFloatOrPercent/literal-percent representation precedent found in modules/core-modules/*/*.toml (grepped); represented here as a plain mm float per the docs/03_wit_and_manifest.md unit=\"mm\" convention (see tree_support_branch_diameter). Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.alternate_extra_wall]
type        = "bool"
default     = false
display     = "Alternate extra wall"
description = "OrcaSlicer coBool key alternate_extra_wall; adds an extra perimeter wall on alternating layers to correct over-extrusion patterns. Not yet consumed by run_perimeters in this packet."
group       = "Walls"

[config.schema.bridge_flow]
type        = "float"
default     = 1.0
min         = 0.0
display     = "Bridge flow ratio"
description = "OrcaSlicer coFloat key bridge_flow; flow-rate multiplier applied to bridging extrusions. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow, applied at is_bridge vertices."
group       = "Quality"

[config.schema.thick_bridges]
type        = "bool"
default     = false
display     = "Thick bridges"
description = "OrcaSlicer coBool key thick_bridges; when true, bridge extrusions use full un-scarfed layer height instead of the thin/adaptive bridge height. Consumed by run_perimeters: D4 per-vertex bridge flow factor via slicer_core::flow::bridging_flow (thick_bridges=true short-circuits the ratio to 1.0)."
group       = "Quality"

# ── Packet 150 Step 6: dead-read fix ─────────────────────────────────────
# nozzle_diameter was already read by run_perimeters (R4 thin-wall threshold)
# but never declared here, so the host's declared-key ConfigView filter
# silently dropped it and the read always fell back to inner_wall_line_width
# (pre-existing dead read, packet 150's original scope).
# layer_height is a NEW read introduced by packet 150 Step 5's bridging_flow
# signature change (threaded through emit_walls for the thick_bridges
# round-cross-section formula, mirroring nozzle_diameter) — it was never a
# pre-existing dead read; it did not exist before this packet. It is declared
# here from the start so it does not repeat the same silent-fallback bug.
# Defaults below match the code-side fallback values exactly
# (nozzle_diameter -> inner_wall_line_width, layer_height -> 0.2).

[config.schema.nozzle_diameter]
type        = "float"
default     = 0.4
min         = 0.1
max         = 2.0
unit        = "mm"
display     = "Nozzle diameter"
description = "OrcaSlicer coFloat key nozzle_diameter; read by run_perimeters for the R4 thin-wall threshold (min_width = nozzle_diameter/3) and threaded into bridging_flow. Falls back to inner_wall_line_width when absent."
group       = "Walls"

[config.schema.layer_height]
type        = "float"
default     = 0.2
min         = 0.01
max         = 2.0
unit        = "mm"
display     = "Layer height"
description = "OrcaSlicer coFloat key layer_height; read by run_perimeters (packet 150 step 5) alongside nozzle_diameter for bridging_flow's thick_bridges round-cross-section formula (D-104g)."
group       = "Quality"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

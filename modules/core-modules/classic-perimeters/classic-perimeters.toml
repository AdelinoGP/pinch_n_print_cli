[module]
id           = "com.core.classic-perimeters"
version      = "0.1.0"
display-name = "Classic Perimeters"
description  = "Core classic perimeters module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Perimeters"

[ir-access]
reads  = ["SliceIR", "PaintRegionIR"]
writes = ["PerimeterIR"]

[claims]
holds    = ["perimeter-generator"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.wall_count]
type    = "int"
default = 3
min     = 1
max     = 10
display = "Wall Count"
group   = "Walls"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Walls"

[config.schema.outer_wall_speed]
type    = "float"
default = 30.0
min     = 1.0
max     = 300.0
display = "Outer Wall Speed"
group   = "Walls"

[config.schema.inner_wall_speed]
type    = "float"
default = 45.0
min     = 1.0
max     = 300.0
display = "Inner Wall Speed"
group   = "Walls"

[config.schema.perimeter_arc_tolerance]
type    = "float"
default = 0.0125
min     = 0.0
max     = 1.0
display = "Perimeter arc tolerance (mm)"
group   = "Quality"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[module]
id           = "com.core.top-surface-ironing"
version      = "0.2.0"
display-name = "Top Surface Ironing"
description  = "Emits low-flow ironing strokes over polygon-precise top solid fill areas at the topmost exposed surface of each region."
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer"

[stage]
id = "Layer::Infill"

[ir-access]
# Ironing reads `SliceIR.top_solid_fill` for the ironing polygon; it does not
# read InfillIR. Ordering-after-infill is established via `[compatibility].requires`
# below (ExplicitRequires DAG edges) — see DEV-065 (2026-06-09) for the
# rationale (the prior fake `InfillIR` read violated docs/01 §"Module Access
# Contract" since InfillIR is produced within this same stage).
reads  = ["SliceIR"]
writes = ["InfillIR"]

[claims]
holds    = ["claim:ironing"]
requires = []

[compatibility]
incompatible-with = []
# Run after every fill-emitting infill module at Layer::Infill. Each entry
# becomes an `EdgeReason::ExplicitRequires` edge in the per-stage DAG
# (`crates/slicer-scheduler/src/dag.rs`); missing modules are silently
# ignored, so listing all three is safe even if one is not loaded.
requires          = [
    "com.core.gyroid-infill",
    "com.core.lightning-infill",
    "com.core.rectilinear-infill",
]
min-host-version  = "0.1.0"
min-ir-schema     = "3.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.ironing_enabled]
type    = "bool"
default = false
display = "Enable Ironing"
group   = "TopSurface"

[config.schema.ironing_speed]
type    = "float"
default = 20.0
min     = 1.0
max     = 300.0
display = "Ironing Speed"
group   = "TopSurface"

[config.schema.ironing_flow]
type    = "float"
default = 0.10
min     = 0.01
max     = 1.0
display = "Ironing Flow"
group   = "TopSurface"

[config.schema.ironing_spacing_mm]
type    = "float"
default = 0.1
min     = 0.01
max     = 1.0
display = "Ironing Spacing"
group   = "TopSurface"

[config.schema.ironing_pattern]
type    = "enum"
values  = ["rectilinear"]
default = "rectilinear"
display = "Ironing Pattern"
group   = "TopSurface"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

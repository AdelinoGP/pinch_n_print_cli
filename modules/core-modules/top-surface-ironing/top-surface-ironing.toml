[module]
id           = "com.core.top-surface-ironing"
version      = "0.2.0"
display-name = "Top Surface Ironing"
description  = "Emits low-flow ironing strokes over polygon-precise top solid fill areas at the topmost exposed surface of each region."
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::Infill"

[ir-access]
# Declared read on InfillIR is for DAG-ordering purposes only — it establishes
# a read-after-write edge so the validator orders ironing AFTER infill modules
# (gyroid, rectilinear, lightning) at Layer::Infill, eliminating the previously
# advisory `WriteConflict { orderable: false }` warning on shared InfillIR
# writes. The runtime impl never actually reads InfillIR (it reads
# `SliceIR.top_solid_fill` for the ironing polygon). See DEV-065 (2026-06-09)
# and docs/04_host_scheduler.md §"Ordering via declared reads".
reads  = ["SliceIR", "InfillIR"]
writes = ["InfillIR"]

[claims]
holds    = ["claim:ironing"]
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "3.0.0"
max-ir-schema     = "5.0.0"

[config.schema]
[config.schema.ironing_enabled]
type    = "bool"
default = true
display = "Enable Ironing"
group   = "TopSurface"

[config.schema.ironing_speed]
type    = "float"
default = 20.0
min     = 1.0
max     = 300.0
display = "Ironing Speed"
group   = "TopSurface"

[config.schema.ironing_flow]
type    = "float"
default = 0.10
min     = 0.01
max     = 1.0
display = "Ironing Flow"
group   = "TopSurface"

[config.schema.ironing_spacing_mm]
type    = "float"
default = 0.1
min     = 0.01
max     = 1.0
display = "Ironing Spacing"
group   = "TopSurface"

[config.schema.ironing_pattern]
type    = "enum"
values  = ["rectilinear"]
default = "rectilinear"
display = "Ironing Pattern"
group   = "TopSurface"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[module]
id           = "com.core.wipe-tower"
version      = "0.1.0"
display-name = "Wipe Tower"
description  = "Core wipe tower module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-finalization@1.0.0"

[stage]
id = "PostPass::LayerFinalization"

[ir-access]
reads  = ["LayerCollectionIR"]
writes = ["LayerCollectionIR.wipe-tower"]

[claims]
holds    = []
requires = []

[compatibility]
incompatible-with = []
requires          = ["com.core.skirt-brim", "com.core.part-cooling", "com.core.top-surface-ironing"]
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
[config.schema.wipe_tower_enabled]
type    = "bool"
default = true
display = "Wipe Tower Enabled"
group   = "Wipe Tower"

[config.schema.wipe_tower_x]
type    = "float"
default = 10.0
min     = 0.0
max     = 300.0
display = "Wipe Tower X"
group   = "Wipe Tower"

[config.schema.wipe_tower_y]
type    = "float"
default = 10.0
min     = 0.0
max     = 300.0
display = "Wipe Tower Y"
group   = "Wipe Tower"

[config.schema.wipe_tower_width]
type    = "float"
default = 60.0
min     = 1.0
max     = 100.0
display = "Wipe Tower Width"
group   = "Wipe Tower"

[config.schema.wipe_tower_purge_volume]
type    = "float"
default = 10.0
min     = 1.0
max     = 50.0
display = "Wipe Tower Purge Volume"
group   = "Wipe Tower"

[config.schema.line_width]
type    = "float"
default = 0.4
min     = 0.1
max     = 2.0
display = "Line Width"
group   = "Wipe Tower"

[config.schema.bed_shape]
type     = "float-list"
required = true
display  = "Bed Shape"
group    = "Printer"
description = "Printer bed polygon as [x0, y0, x1, y1, ...] in mm"

[config.schema.retract_length]
type    = "float"
default = 2.0
min     = 0.0
max     = 20.0
display = "Retract Length"
group   = "Wipe Tower"
description = "Retract length in mm before tool change"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = false

[module]
id           = "com.core.fuzzy-skin"
version      = "0.1.0"
display-name = "Fuzzy Skin"
description  = "Core fuzzy skin module"
author       = "modular-slicer"
license      = "MIT"
wit-world    = "slicer:world-layer@1.0.0"

[stage]
id = "Layer::PerimetersPostProcess"

[ir-access]
reads  = ["PerimeterIR"]
writes = ["PerimeterIR"]

[claims]
holds    = []
requires = []

[compatibility]
incompatible-with = []
requires          = []
min-host-version  = "0.1.0"
min-ir-schema     = "1.0.0"
max-ir-schema     = "2.0.0"

[config.schema]
[config.schema.thickness]
type    = "float"
default = 0.3
min     = 0.0
max     = 2.0
display = "Fuzzy Skin Thickness"
group   = "Fuzzy Skin"

[config.schema.point_distance]
type    = "float"
default = 0.5
min     = 0.01
max     = 5.0
display = "Point Distance"
group   = "Fuzzy Skin"

[config.schema.apply_to_all]
type    = "bool"
default = false
display = "Apply to All Walls"
group   = "Fuzzy Skin"

[config.overridable-per-region]
keys = []

[config.overridable-per-layer]
keys = []

[hints]
estimated-ms-per-layer = 10
layer-parallel-safe    = true

[package]
name = "slicer-sdk"
version = "0.1.0"
edition = "2021"
authors = ["ModularSlicer Team"]

[dependencies]
serde = { version = "1", features = ["derive"] }
slicer-ir = { path = "../slicer-ir" }
slicer-core = { path = "../slicer-core" }
slicer-macros = { path = "../slicer-macros" }
slicer-schema = { path = "../slicer-schema" }

[lints.rust]
missing_docs = "warn"
unused_imports = "warn"
unused_must_use = "warn"

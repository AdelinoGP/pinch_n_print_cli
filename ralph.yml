event_loop:
  prompt_file: .ralph/prompts/spec-runner.md
  completion_promise: SPEC_PACKET_COMPLETE
  max_iterations: 60
  max_runtime_seconds: 28800
  idle_timeout_secs: 600
  starting_event: work.start
  verbose: true
cli:
  backend: claude
features:
  parallel: false
core:
  specs_dir: ./.ralph/specs/
  guardrails:
    - The only run-scoped requirements are the files in the single active packet under ./.ralph/specs/.
    - docs/07_implementation_status.md is the canonical backlog and prioritization source; use it to confirm packet task IDs and to update completion state, not to expand scope mid-run.
    - "If zero or multiple packet.spec.md files are marked status: active, stop and report blocked instead of guessing."
    - "Follow the authority order from docs/00_project_overview.md: docs/01-03 first, then docs/04 and docs/09, then docs/05, then docs/00 plus status and governance docs."
    - Only tasks listed in the active packet are in scope. Do not pull new work from the rest of the backlog during the run.
    - "TDD is required: add or expose failing tests first, then implement, then rerun the narrowest relevant validation before widening scope."
    - Before mirroring OrcaSlicer behavior, inspect ./OrcaSlicerDocumented/ and carry forward the specific reference paths used for the packet.
    - "Backpressure is law: cargo build --workspace, targeted tests (cargo test -p <crate> --test <file> or cargo check --workspace), and cargo clippy --workspace -- -D warnings must pass during iteration. The full cargo test --workspace suite runs at most once, only at the packet completion ceremony, and only if the packet spec marks it as a closure gate."
    - Use .ralph/agent/tasks.jsonl as the active execution queue and .ralph/agent/memories.md as learned context. Scratchpad files are not the task ledger.
    - Update docs/07_implementation_status.md only for the task IDs owned by the active packet and only after the packet acceptance evidence is green.
    - "Do not modify or write to files in another packet's directory. If this packet corrects work from another packet, mark that packet status: superseded in its own packet.spec.md."
backpressure:
  gates:
    - name: build
      command: cargo build --workspace
      on_fail: Workspace build failed. Fix all build errors and retry.
    - name: clippy
      command: cargo clippy --workspace -- -D warnings
      on_fail: Clippy warnings found. Fix all lint issues and retry.
  # test gate runs at packet-close ceremony only, not during iteration.
  # the >1000-test suite takes ≥11 min; targeted tests (cargo test -p <crate> --test <file>)
  # are the workhorse during implementation. see cargo check for seconds-fast validation.
hats:
  spec_executor:
    name: Spec Executor
    model: claude-opus-4-6
    variant: high
    description: Drives one prepared Pinch 'n Print packet from scope check to verified completion
    triggers:
      - work.start
      - implementation.done
      - implementation.blocked
      - verification.pass
      - verification.fail
    publishes:
      - implementation.ready
      - verification.ready
      - SPEC_PACKET_COMPLETE
    instructions: |
      You execute exactly one prepared spec packet at a time. You are not a project-wide planner.

      ## Active Packet Contract
      - Read `./docs/07_implementation_status.md` only to confirm task IDs and completion state.
      - Discover packet roots under `./.ralph/specs/`. (Templates live in the `spec-packet-generator` skill at `.claude/skills/spec-packet-generator/references/templates/`, never under `.ralph/specs/`.)
      - Each packet must include:
        - `packet.spec.md`
        - `requirements.md`
        - `design.md`
        - `implementation-plan.md`
        - optional `task-map.md`
      - Select the one packet whose `packet.spec.md` front matter declares `status: active`.
      - If no packet or more than one packet is active, stop and emit `implementation.blocked` with the exact reason.
      - Treat only files inside the active packet folder as run-scoped requirements.
      - **AC completeness gate:** Before emitting `implementation.ready`, verify every Given/When/Then acceptance criterion in `packet.spec.md` ends with a pipe and a runnable verification command. If any criterion lacks this, emit `implementation.blocked` with the exact missing criterion and its required verification format.
      - **Packet readiness gate:** Do not execute an `active` packet if it still contains unresolved open questions that would change scope, no negative case for validation/enforcement work, or implementation steps without explicit preconditions, postconditions, or exit conditions. Emit `implementation.blocked` with the exact missing packet element.

      ## Packet Intake
      1. Read `packet.spec.md`, `requirements.md`, `design.md`, `implementation-plan.md`, and `task-map.md` if present.
      2. Confirm every grouped task ID named by the packet exists in `./docs/07_implementation_status.md`.
      3. Confirm the packet cites the authoritative docs and OrcaSlicer references required for the slice.
      4. Break the next incomplete plan item into one atomic implementation step and identify the exact step-local acceptance criteria, preconditions, postconditions, exit conditions, and verification commands.

      ## Event Responsibilities
      - On `work.start`:
        - create or refresh runtime tasks for the next atomic step in `.ralph/agent/tasks.jsonl`
        - emit `implementation.ready` with:
          - active packet path
          - step title
          - grouped task IDs
          - step-local acceptance criteria
          - step preconditions
          - step postconditions
          - step exit conditions
          - files or subsystems in scope
          - authoritative docs
          - OrcaSlicer reference obligations
          - verification commands
      - On `implementation.done`:
        - compare the report against the active packet
        - if the change is off-packet, under-tested, missing criterion-by-criterion evidence, missing step exit-condition evidence, or violates cited docs, emit `implementation.ready` with a correction brief
        - otherwise emit `verification.ready` with the packet acceptance checks for that step
      - On `implementation.blocked`:
        - keep the packet boundary intact
        - emit a narrower `implementation.ready` only if the packet already contains a valid fallback step
        - otherwise keep the run blocked rather than inventing new scope
      - On `verification.fail`:
        - emit `implementation.ready` with only the defects needed to satisfy the current packet step
      - On `verification.pass`:
        - do not update `./docs/07_implementation_status.md` yet
        - if more packet steps remain, emit the next `implementation.ready`
        - otherwise run a packet completion ceremony:
          - re-check that every acceptance criterion in `packet.spec.md` still has a pipe-suffixed runnable command
          - confirm every acceptance criterion's stated command has explicit passing evidence from verification
          - confirm every packet step's exit condition is satisfied
          - confirm every grouped task ID is reconciled by the completed steps and `task-map.md` when present
          - confirm any superseded or reopened packet status transitions required by the active packet are complete
        - only after the completion ceremony is fully green may you update the matching task lines in `./docs/07_implementation_status.md`, change the active packet's `packet.spec.md` status to `implemented`, and emit `SPEC_PACKET_COMPLETE`

      ## Scope Rules
      - Never re-prioritize the full backlog.
      - Never pull tasks from outside the active packet.
      - Prefer the smallest next step that keeps the packet moving.
      - Use `.ralph/agent/memories.md` for learned context only, not as the active plan.
  implementer:
    name: Implementation Agent
    model: claude-opus-4-6
    variant: high
    description: Implements one active packet step with repo-specific architecture and validation rules
    triggers:
      - implementation.ready
    publishes:
      - implementation.done
      - implementation.blocked
    instructions: |
      You implement exactly the active packet step carried by `implementation.ready`.

      ## Required Inputs
      - Read the active packet files named in the event payload.
      - Read only the cited canonical docs needed for the step.
      - Use `./docs/07_implementation_status.md` only to confirm the packet's task IDs and current state.
      - Inspect `./OrcaSlicerDocumented/` when the packet or event payload says the behavior mirrors OrcaSlicer.

      ## Execution Rules
      - Stay inside the packet boundary. Do not work ahead.
      - Follow TDD: add or expose a failing test first, then implement, then rerun the narrowest relevant validation.
      - Prefer small, reviewable edits and narrow commands before workspace-wide gates.
      - Preserve Pinch 'n Print contract rules from the cited docs, especially docs/01-05 and docs/08.
      - Use runtime tasks for execution tracking. Do not use scratchpad files as the task list.
      - **Per-criterion verification binding:** Each Given/When/Then acceptance criterion has a pipe-suffixed verification command. Run that exact command to validate the criterion, not a broader or different one. If the command does not pass, the step is not complete.
      - A step is not complete until its stated precondition, postcondition, and exit condition are all satisfied with explicit evidence.

      ## Completion Report
      Emit `implementation.done` only when you can provide:
      - step title
      - summary of what changed
      - files changed
      - step-local acceptance criteria satisfied
      - step precondition, postcondition, and exit-condition status
      - exact commands run and their outcomes
      - tests run
      - OrcaSlicer references consulted, if any
      - remaining packet-local risks or follow-ups, which must be empty for the current step

      If any step-local acceptance criterion or exit condition is still unmet, emit `implementation.blocked` instead of `implementation.done`.

      Emit `implementation.blocked` when:
      - the packet is missing authoritative inputs
      - the next step would exceed the declared packet boundary
      - required dependencies or file paths are missing
      - the cited docs conflict and the packet does not resolve the conflict
      - the current step cannot yet prove its stated exit condition or criterion-level evidence
  verifier:
    name: Verification Agent
    model: claude-sonnet-4-6
    variant: high
    description: Validates one packet step against the active spec contract and required repo gates
    triggers:
      - verification.ready
    publishes:
      - verification.pass
      - verification.fail
    instructions: |
      You validate one active packet step against the packet contract.

      ## Validation Order
      1. Read the active packet's `packet.spec.md` acceptance criteria.
      2. Read the step-specific commands and expectations from `implementation-plan.md`.
      3. Run the exact criterion commands and step verification commands needed to prove the current step's acceptance criteria and exit condition.
      4. Escalate to workspace gates when the packet requires them or when the touched surface is broad enough to justify them.

      ## What Must Be Proven
      - The implementation satisfies the packet's Given/When/Then acceptance criteria.
      - Each criterion's pipe-suffixed verification command passes. Do not substitute a different command for a criterion's stated verification.
      - The current step's precondition, postcondition, and exit condition are actually met.
      - The changed behavior stays inside the active packet scope.
      - The cited authoritative docs are not contradicted.
      - The required verification commands from the packet are actually green.

      ## Reporting
      - Emit `verification.pass` only when you can report criterion-by-criterion evidence, step exit-condition evidence, commands run, and any residual packet-local risk.
      - Emit `verification.fail` with the exact failing command or unmet criterion and a minimal defect brief.
      - Do not create new scope or rewrite the packet during verification.
memories:
  enabled: true
  inject: auto
tasks:
  enabled: false
RObot:
  enabled: true
  timeout_seconds: 120
